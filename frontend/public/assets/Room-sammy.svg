<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 497">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="50%" stop-color="#050812"/>
      <stop offset="100%" stop-color="#030508"/>
    </linearGradient>
    
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0.02"/>
    </linearGradient>
    
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1525"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00FFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Scanline pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#00FFFF" stroke-opacity="0.03"/>
    </pattern>
    
    <!-- Grid pattern for floor -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 20 L40 20 M20 0 L20 40" stroke="#00FFFF" stroke-opacity="0.08" fill="none"/>
    </pattern>
    
    <!-- Hex pattern -->
    <pattern id="hex" width="30" height="26" patternUnits="userSpaceOnUse">
      <polygon points="15,0 30,7.5 30,18.5 15,26 0,18.5 0,7.5" fill="none" stroke="#00FFFF" stroke-opacity="0.03"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="497" fill="url(#bgGrad)"/>
  
  <!-- Hex pattern overlay -->
  <rect width="700" height="497" fill="url(#hex)" opacity="0.5"/>
  
  <!-- Scanlines -->
  <rect width="700" height="497" fill="url(#scanlines)" opacity="0.8"/>
  
  <!-- City skyline silhouette -->
  <g fill="#0a0f18">
    <polygon points="0,200 30,180 30,250 0,250"/>
    <polygon points="30,200 60,160 60,250 30,250"/>
    <polygon points="60,200 90,190 90,250 60,250"/>
    <polygon points="90,200 120,150 120,250 90,250"/>
    <polygon points="120,200 150,170 150,250 120,250"/>
    <polygon points="150,200 200,120 200,250 150,250"/>
    <polygon points="200,200 230,160 230,250 200,250"/>
    <polygon points="230,200 280,100 280,250 230,250"/>
    <polygon points="280,200 310,130 310,250 280,250"/>
    <polygon points="310,200 340,150 340,250 310,250"/>
    <polygon points="340,200 400,80 400,250 340,250"/>
    <polygon points="400,200 430,140 430,250 400,250"/>
    <polygon points="430,200 480,110 480,250 430,250"/>
    <polygon points="480,200 510,160 510,250 480,250"/>
    <polygon points="510,200 540,130 540,250 510,250"/>
    <polygon points="540,200 580,90 580,250 540,250"/>
    <polygon points="580,200 610,140 610,250 580,250"/>
    <polygon points="610,200 650,170 650,250 610,250"/>
    <polygon points="650,200 680,190 680,250 650,250"/>
    <polygon points="680,200 700,200 700,250 680,250"/>
  </g>
  
  <!-- Building windows (glow) -->
  <g fill="#00FFFF" filter="url(#glow)">
    <rect x="35" y="210" width="4" height="6" opacity="0.6"/>
    <rect x="45" y="200" width="4" height="6" opacity="0.4"/>
    <rect x="35" y="225" width="4" height="6" opacity="0.3"/>
    <rect x="100" y="180" width="4" height="6" opacity="0.5"/>
    <rect x="110" y="195" width="4" height="6" opacity="0.7"/>
    <rect x="160" y="190" width="4" height="6" opacity="0.4"/>
    <rect x="170" y="180" width="4" height="6" opacity="0.6"/>
    <rect x="220" y="170" width="4" height="6" opacity="0.5"/>
    <rect x="230" y="185" width="4" height="6" opacity="0.3"/>
    <rect x="290" y="130" width="4" height="6" opacity="0.7"/>
    <rect x="300" y="145" width="4" height="6" opacity="0.5"/>
    <rect x="350" y="110" width="4" height="6" opacity="0.8"/>
    <rect x="360" y="125" width="4" height="6" opacity="0.4"/>
    <rect x="370" y="100" width="4" height="6" opacity="0.6"/>
    <rect x="420" y="160" width="4" height="6" opacity="0.5"/>
    <rect x="450" y="130" width="4" height="6" opacity="0.7"/>
    <rect x="460" y="145" width="4" height="6" opacity="0.4"/>
    <rect x="490" y="140" width="4" height="6" opacity="0.6"/>
    <rect x="520" y="150" width="4" height="6" opacity="0.5"/>
    <rect x="550" y="120" width="4" height="6" opacity="0.8"/>
    <rect x="560" y="135" width="4" height="6" opacity="0.4"/>
    <rect x="600" y="160" width="4" height="6" opacity="0.6"/>
    <rect x="620" y="175" width="4" height="6" opacity="0.5"/>
    <rect x="660" y="185" width="4" height="6" opacity="0.4"/>
  </g>
  
  <!-- Main control console desk -->
  <g>
    <!-- Desk surface -->
    <rect x="100" y="320" width="500" height="20" fill="url(#panelGrad)" stroke="#00FFFF" stroke-opacity="0.3"/>
    <rect x="100" y="315" width="500" height="8" fill="#0a1525" stroke="#00FFFF" stroke-opacity="0.5" filter="url(#glow)"/>
    
    <!-- Desk edge glow -->
    <line x1="100" y1="323" x2="600" y2="323" stroke="url(#glowGrad)" stroke-width="2"/>
  </g>
  
  <!-- Monitors on desk -->
  <g>
    <!-- Left monitor bank -->
    <rect x="120" y="220" width="80" height="60" fill="#050810" stroke="#00FFFF" stroke-opacity="0.4"/>
    <rect x="125" y="225" width="70" height="45" fill="#0a1015"/>
    <line x1="125" y1="230" x2="195" y2="230" stroke="#00FFFF" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="125" y1="240" x2="160" y2="240" stroke="#00FFFF" stroke-opacity="0.2" stroke-width="1"/>
    <text x="128" y="255" fill="#00FFFF" font-size="8" font-family="monospace" opacity="0.7">SYS STATUS</text>
    <circle cx="180" cy="245" r="3" fill="#00FF41" filter="url(#glow)"/>
    <circle cx="180" cy="258" r="3" fill="#00FF41" filter="url(#glow)"/>
    
    <!-- Center monitor (largest) -->
    <rect x="260" y="180" width="180" height="120" fill="#050810" stroke="#00FFFF" stroke-opacity="0.5"/>
    <rect x="268" y="188" width="164" height="100" fill="#0a1015"/>
    <rect x="268" y="188" width="164" height="15" fill="#00FFFF" fill-opacity="0.1"/>
    <text x="275" y="198" fill="#00FFFF" font-size="7" font-family="monospace">COMMAND CENTER v1.0</text>
    <line x1="268" y1="220" x2="432" y2="220" stroke="#00FFFF" stroke-opacity="0.2"/>
    <line x1="268" y1="240" x2="380" y2="240" stroke="#00FFFF" stroke-opacity="0.15"/>
    <line x1="268" y1="260" x2="350" y2="260" stroke="#00FFFF" stroke-opacity="0.1"/>
    <rect x="275" y="275" width="30" height="8" fill="#FF5C3A" opacity="0.6"/>
    <rect x="310" y="275" width="30" height="8" fill="#00FF41" opacity="0.6"/>
    <text x="350" y="282" fill="#00FFFF" font-size="6" font-family="monospace" opacity="0.5">◉ ACTIVE</text>
    
    <!-- Right monitor bank -->
    <rect x="500" y="230" width="80" height="50" fill="#050810" stroke="#00FFFF" stroke-opacity="0.4"/>
    <rect x="505" y="235" width="70" height="38" fill="#0a1015"/>
    <text x="510" y="248" fill="#FF5C3A" font-size="6" font-family="monospace" opacity="0.6">ALERTS</text>
    <text x="510" y="262" fill="#00FFFF" font-size="6" font-family="monospace" opacity="0.4">NO ACTIVE</text>
  </g>
  
  <!-- Floor with perspective grid -->
  <g>
    <polygon points="0,300 700,300 700,497 0,497" fill="url(#floorGrad)"/>
    <rect x="0" y="300" width="700" height="197" fill="url(#grid)"/>
    
    <!-- Floor perspective lines -->
    <line x1="350" y1="300" x2="0" y2="497" stroke="#00FFFF" stroke-opacity="0.1"/>
    <line x1="350" y1="300" x2="100" y2="497" stroke="#00FFFF" stroke-opacity="0.08"/>
    <line x1="350" y1="300" x2="200" y2="497" stroke="#00FFFF" stroke-opacity="0.06"/>
    <line x1="350" y1="300" x2="300" y2="497" stroke="#00FFFF" stroke-opacity="0.05"/>
    <line x1="350" y1="300" x2="400" y2="497" stroke="#00FFFF" stroke-opacity="0.05"/>
    <line x1="350" y1="300" x2="500" y2="497" stroke="#00FFFF" stroke-opacity="0.06"/>
    <line x1="350" y1="300" x2="600" y2="497" stroke="#00FFFF" stroke-opacity="0.08"/>
    <line x1="350" y1="300" x2="700" y2="497" stroke="#00FFFF" stroke-opacity="0.1"/>
    
    <!-- Floor glow lines -->
    <line x1="0" y1="340" x2="700" y2="340" stroke="#00FFFF" stroke-opacity="0.05"/>
    <line x1="0" y1="380" x2="700" y2="380" stroke="#00FFFF" stroke-opacity="0.03"/>
    <line x1="0" y1="420" x2="700" y2="420" stroke="#00FFFF" stroke-opacity="0.02"/>
  </g>
  
  <!-- Side panels / walls -->
  <g opacity="0.3">
    <!-- Left wall -->
    <rect x="0" y="100" width="80" height="300" fill="#0a0f18"/>
    <rect x="70" y="100" width="5" height="300" fill="#00FFFF" opacity="0.1"/>
    <circle cx="40" cy="180" r="20" fill="none" stroke="#00FFFF" stroke-width="0.5"/>
    <circle cx="40" cy="180" r="12" fill="none" stroke="#00FFFF" stroke-width="0.3"/>
    <circle cx="40" cy="180" r="4" fill="#00FFFF"/>
    
    <!-- Right wall -->
    <rect x="620" y="100" width="80" height="300" fill="#0a0f18"/>
    <rect x="625" y="100" width="5" height="300" fill="#00FFFF" opacity="0.1"/>
    <circle cx="660" cy="220" r="25" fill="none" stroke="#00FFFF" stroke-width="0.5"/>
    <circle cx="660" cy="220" r="15" fill="none" stroke="#00FFFF" stroke-width="0.3"/>
    <circle cx="660" cy="220" r="5" fill="#FF5C3A"/>
  </g>
  
  <!-- Holographic elements -->
  <g filter="url(#softGlow)">
    <!-- Left hologram -->
    <polygon points="40,280 90,320 40,360" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
    <line x1="55" y1="300" x2="55" y2="340" stroke="#00FFFF" stroke-width="0.5" opacity="0.3"/>
    <line x1="70" y1="310" x2="70" y2="350" stroke="#00FFFF" stroke-width="0.5" opacity="0.3"/>
    
    <!-- Right hologram -->
    <polygon points="660,280 610,320 660,360" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
    <line x1="645" y1="300" x2="645" y2="340" stroke="#00FFFF" stroke-width="0.5" opacity="0.3"/>
    <line x1="630" y1="310" x2="630" y2="350" stroke="#00FFFF" stroke-width="0.5" opacity="0.3"/>
  </g>
  
  <!-- Ambient particles (static but adds life) -->
  <g fill="#00FFFF" opacity="0.4">
    <circle cx="150" cy="150" r="1"/>
    <circle cx="250" cy="100" r="1.5"/>
    <circle cx="450" cy="120" r="1"/>
    <circle cx="550" cy="90" r="1.5"/>
    <circle cx="80" cy="280" r="1"/>
    <circle cx="620" cy="260" r="1"/>
    <circle cx="200" cy="350" r="0.8"/>
    <circle cx="500" cy="380" r="0.8"/>
  </g>
  
  <!-- More monitor screens on walls -->
  <g opacity="0.6">
    <rect x="15" y="320" width="50" height="35" fill="#050810" stroke="#00FFFF" stroke-opacity="0.3"/>
    <rect x="20" y="325" width="40" height="22" fill="#0a1015"/>
    <line x1="20" y1="330" x2="60" y2="330" stroke="#00FFFF" stroke-opacity="0.2"/>
    <text x="23" y="340" fill="#00FFFF" font-size="5" font-family="monospace">NODES: 8</text>
    <text x="23" y="348" fill="#00FF41" font-size="5" font-family="monospace">OK</text>
    
    <rect x="635" y="330" width="50" height="35" fill="#050810" stroke="#00FFFF" stroke-opacity="0.3"/>
    <rect x="640" y="335" width="40" height="22" fill="#0a1015"/>
    <line x1="640" y1="340" x2="680" y2="340" stroke="#00FFFF" stroke-opacity="0.2"/>
    <text x="643" y="350" fill="#00FFFF" font-size="5" font-family="monospace">UPTIME</text>
    <text x="643" y="358" fill="#00FF41" font-size="5" font-family="monospace">99.9%</text>
  </g>
  
  <!-- Ceiling lights -->
  <g>
    <line x1="150" y1="0" x2="150" y2="80" stroke="#00FFFF" stroke-opacity="0.3"/>
    <rect x="145" y="75" width="10" height="5" fill="#00FFFF" opacity="0.6" filter="url(#glow)"/>
    
    <line x1="350" y1="0" x2="350" y2="100" stroke="#00FFFF" stroke-opacity="0.4"/>
    <rect x="345" y="95" width="10" height="5" fill="#00FFFF" opacity="0.8" filter="url(#glow)"/>
    
    <line x1="550" y1="0" x2="550" y2="80" stroke="#00FFFF" stroke-opacity="0.3"/>
    <rect x="545" y="75" width="10" height="5" fill="#00FFFF" opacity="0.6" filter="url(#glow)"/>
  </g>
  
  <!-- Center stage area (where avatar stands) -->
  <g>
    <!-- Platform glow -->
    <ellipse cx="350" cy="400" rx="80" ry="15" fill="#00FFFF" opacity="0.08" filter="url(#softGlow)"/>
    <ellipse cx="350" cy="400" rx="50" ry="8" fill="#00FFFF" opacity="0.15"/>
    
    <!-- Platform rings -->
    <ellipse cx="350" cy="398" rx="70" ry="12" fill="none" stroke="#00FFFF" stroke-width="0.5" opacity="0.3"/>
    <ellipse cx="350" cy="396" rx="85" ry="15" fill="none" stroke="#00FFFF" stroke-width="0.3" opacity="0.2"/>
    
    <!-- Standing position marker -->
    <rect x="340" y="390" width="20" height="5" fill="#00FFFF" opacity="0.4"/>
  </g>
  
  <!-- Data streams on sides -->
  <g opacity="0.5">
    <line x1="85" y1="150" x2="85" y2="400" stroke="#00FFFF" stroke-width="0.5" stroke-dasharray="3,5"/>
    <line x1="615" y1="150" x2="615" y2="400" stroke="#00FFFF" stroke-width="0.5" stroke-dasharray="3,5"/>
  </g>
</svg>