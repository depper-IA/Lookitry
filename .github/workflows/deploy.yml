name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detectar cambios
        id: changes
        run: |
          PREV=$(git rev-parse HEAD~1)
          CURR=$(git rev-parse HEAD)
          CHANGED=$(git diff --name-only $PREV $CURR)
          echo "$CHANGED"
          # Si el commit message contiene [deploy-all] o [force] o está vacío → deploy ambos
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -qE '\[deploy-all\]|\[force\]|force deploy'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=$(echo "$CHANGED" | grep -q '^frontend/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "backend=$(echo "$CHANGED" | grep -q '^backend/' && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

      - name: Deploy frontend
        if: steps.changes.outputs.frontend == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: 31.220.18.39
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22
          script: |
            cd /root/virtual-tryon
            git pull origin main
            docker compose -f docker-compose.frontend.yml build frontend
            docker compose -f docker-compose.frontend.yml up -d frontend
            echo "Frontend desplegado: $(git rev-parse --short HEAD)"

      - name: Deploy backend
        if: steps.changes.outputs.backend == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: 31.220.18.39
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22
          script: |
            cd /root/virtual-tryon
            git pull origin main
            docker compose -f docker-compose.backend.yml build backend
            docker compose -f docker-compose.backend.yml up -d backend
            echo "Backend desplegado: $(git rev-parse --short HEAD)"
