name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar cambios
        id: changes
        run: |
          PREV=$(git rev-parse HEAD~1 2>/dev/null || echo "HEAD")
          CURR=$(git rev-parse HEAD)
          if [ "$PREV" = "$CURR" ]; then
            echo "No hay commit previo, deploy completo"
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only $PREV $CURR)
            echo "$CHANGED"
            MSG=$(git log -1 --pretty=%s)
            if echo "$MSG" | grep -qE '\[deploy-all\]|\[force\]|force deploy'; then
              echo "frontend=true" >> $GITHUB_OUTPUT
              echo "backend=true" >> $GITHUB_OUTPUT
            else
              echo "frontend=$(echo "$CHANGED" | grep -q '^frontend/' && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "backend=$(echo "$CHANGED" | grep -q '^backend/' && echo true || echo false)" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Frontend deploy: ${{ steps.changes.outputs.frontend }}"
          echo "Backend deploy: ${{ steps.changes.outputs.backend }}"

      - name: Deploy frontend
        if: steps.changes.outputs.frontend == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 31.220.18.39
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22
          timeout: 900s
          command_timeout: 900s
          script: |
            echo "=== Deploy Frontend ==="
            cd /root/virtual-tryon || { echo "ERROR: /root/virtual-tryon no existe"; exit 1; }
            
            echo "Pulling latest code..."
            git fetch origin main || { echo "ERROR: git fetch falló"; exit 1; }
            git reset --hard origin/main || { echo "ERROR: git reset falló"; exit 1; }
            echo "Current HEAD: $(git rev-parse --short HEAD)"
            
            # Detectar compose file del frontend
            if [ -f docker-compose.frontend.yml ]; then
              COMPOSE_FILE=docker-compose.frontend.yml
            elif [ -f docker-compose.yml ]; then
              COMPOSE_FILE=docker-compose.yml
            else
              echo "ERROR: No se encontró docker-compose file"
              exit 1
            fi
            
            echo "Building frontend with $COMPOSE_FILE..."
            docker compose -f $COMPOSE_FILE build frontend 2>&1 || { 
              echo "ERROR: docker compose build falló"
              exit 1
            }
            
            echo "Starting frontend..."
            docker compose -f $COMPOSE_FILE up -d frontend 2>&1 || {
              echo "ERROR: docker compose up falló"
              exit 1
            }
            
            sleep 10
            echo "Frontend container status:"
            docker compose -f $COMPOSE_FILE ps frontend
            
            echo "=== Frontend desplegado exitosamente: $(git rev-parse --short HEAD) ==="

      - name: Deploy backend
        if: steps.changes.outputs.backend == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 31.220.18.39
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22
          timeout: 900s
          command_timeout: 900s
          script: |
            echo "=== Deploy Backend ==="
            cd /root/virtual-tryon || { echo "ERROR: /root/virtual-tryon no existe"; exit 1; }
            
            echo "Pulling latest code..."
            git fetch origin main || { echo "ERROR: git fetch falló"; exit 1; }
            git reset --hard origin/main || { echo "ERROR: git reset falló"; exit 1; }
            echo "Current HEAD: $(git rev-parse --short HEAD)"
            
            if [ -f docker-compose.backend.yml ]; then
              COMPOSE_FILE=docker-compose.backend.yml
            elif [ -f docker-compose.yml ]; then
              COMPOSE_FILE=docker-compose.yml
            else
              echo "ERROR: No se encontró docker-compose file"
              exit 1
            fi
            
            echo "Building backend with $COMPOSE_FILE..."
            docker compose -f $COMPOSE_FILE build backend 2>&1 || {
              echo "ERROR: docker compose build falló"
              exit 1
            }
            
            echo "Starting backend..."
            docker compose -f $COMPOSE_FILE up -d backend 2>&1 || {
              echo "ERROR: docker compose up falló"
              exit 1
            }
            
            sleep 10
            echo "Backend container status:"
            docker compose -f $COMPOSE_FILE ps backend
            
            echo "=== Backend desplegado exitosamente: $(git rev-parse --short HEAD) ==="
