<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizando | Lookitry</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-primary: #FFFFFF;
            --text-secondary: #999999;
            --accent: #FF5C3A; /* Accent color matching Lookitry aesthetic */
        }
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle glowing background effect */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 92, 58, 0.03) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            max-width: 500px;
        }

        .logo {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 92, 58, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.75rem;
            font-weight: 500;
            margin: 0 0 1rem 0;
            line-height: 1.2;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin: 0;
            line-height: 1.5;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Continuous pulse on the text so it feels alive */
        .pulse {
            animation: pulse-op 2s infinite ease-in-out;
        }

        @keyframes pulse-op {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#FF5C3A"/>
                <path d="M2 17L12 22L22 17" stroke="#FF5C3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="#FF5C3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Look<span style="color: #FF5C3A">itry</span>
        </div>
        
        <div class="spinner"></div>
        
        <h1 class="pulse">Actualizando plataforma</h1>
        <p>Estamos implementando nuevas mejoras.<br>Volveremos en unos segundos.</p>
    </div>
    <script>
        // Auto-refresh logic to check if the main site is back online
        // It tries fetching the root page; if it succeeds with HTTP 200, it hard reloads
        setInterval(() => {
            fetch('/', { method: 'HEAD', cache: 'no-store' })
                .then(res => {
                    // Check if it's the real app answering (the real app will return 200)
                    // We can distinguish it by checking if it's NOT the 503/fallback
                    if (res.ok && res.status === 200) {
                        window.location.reload(true);
                    }
                })
                .catch(() => {});
        }, 3000);
    </script>
</body>
</html>
