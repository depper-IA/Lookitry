version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: root-n8n-1
    cpus: 2
    mem_limit: 2g
    environment:
      # Task Runner (DISABLED to avoid CPU 600-800%)
      - N8N_RUNNERS_ENABLED=false
      - N8N_NATIVE_PYTHON_RUNNER=false
      # Configuracion basica
      - GENERIC_TIMEZONE=America/Bogota
      - SSL_EMAIL=samwilkiedevs@gmail.com
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      # === URL PUBLICA DE N8N (CRITICO PARA WEBHOOKS) ===
      - WEBHOOK_URL=https://n8n.wilkiedevs.com
      - N8N_HOST=n8n.wilkiedevs.com
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://n8n.wilkiedevs.com
      # MinIO Storage
      - MINIO_SUBDOMAIN=minio
      - MINIO_ENDPOINT=https://minio.wilkiedevs.com
      - MINIO_BUCKET=images
      - MINIO_ACCESS_KEY=Wilkiedevs
      - MINIO_SECRET_KEY=Travis2305*
      - MINIO_PUBLIC_URL=https://minio.wilkiedevs.com
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - proxy
      - n8n_network
    ports:
      - "5678:5678"
    restart: unless-stopped

networks:
  proxy:
    external: true
  n8n_network:
    external: true

volumes:
  n8n_data:
    external: true
