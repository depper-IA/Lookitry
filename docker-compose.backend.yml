services:
  backend:
    build:
      context: /root/virtual-tryon/backend
      dockerfile: Dockerfile
    container_name: lookitry-backend
    restart: unless-stopped
    env_file:
      - /root/virtual-tryon/backend/.env.production
    environment:
      - NODE_OPTIONS=--max-old-space-size=512
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gcs-credentials.json
    volumes:
      - /root/creds:/app/credentials:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vt-backend.rule=Host(`api.lookitry.com`)"
      - "traefik.http.routers.vt-backend.entrypoints=websecure"
      - "traefik.http.routers.vt-backend.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.vt-backend.middlewares=secHeaders,rateLimit"
      - "traefik.http.services.vt-backend.loadbalancer.server.port=3001"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"


networks:
  proxy:
    external: true
