services:
  frontend:
    build:
      context: /root/virtual-tryon/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.lookitry.com}
        NEXT_PUBLIC_APP_URL: https://lookitry.com
        NEXT_PUBLIC_SUPABASE_URL: https://vkdooutklowctuudjnkl.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_N8N_DESCRIPTOR_URL: ${NEXT_PUBLIC_N8N_DESCRIPTOR_URL:-https://n8n.wilkiedevs.com/webhook/descriptor}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-0x4AAAAAACsmy7e_yL9iyAXM}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-568746448761-gp9b68r5sf8jdv9t1jsrtightfqjq0j0.apps.googleusercontent.com}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-G-F8277E4Z39}
        NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-GTM-KX6L62K3}
        NEXT_PUBLIC_REBECCA_WIDGET_ENABLED: ${NEXT_PUBLIC_REBECCA_WIDGET_ENABLED:-true}
        NEXT_PUBLIC_WOMPI_PUBLIC_KEY: ${NEXT_PUBLIC_WOMPI_PUBLIC_KEY}
        NEXT_PUBLIC_WOMPI_ENABLED: ${NEXT_PUBLIC_WOMPI_ENABLED:-false}
        SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
    container_name: lookitry-frontend
    restart: unless-stopped
    environment:
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - INTERNAL_PROXY_SECRET=${INTERNAL_PROXY_SECRET}
    volumes:
      - /home/travis/.openclaw/agents:/home/travis/.openclaw/agents:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vt-frontend.rule=Host(`lookitry.com`) || Host(`www.lookitry.com`)"
      - "traefik.http.routers.vt-frontend.entrypoints=websecure"
      - "traefik.http.routers.vt-frontend.tls.certresolver=mytlschallenge"
      - "traefik.http.services.vt-frontend.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://lookitry-frontend:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"


networks:
  proxy:
    external: true
