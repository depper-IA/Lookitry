services:
  frontend:
    build:
      context: /root/virtual-tryon/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.lookitry.com
        NEXT_PUBLIC_APP_URL: https://lookitry.com
        NEXT_PUBLIC_SUPABASE_URL: https://vkdooutklowctuudjnkl.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ***REMOVED-SECRET***
        NEXT_PUBLIC_N8N_DESCRIPTOR_URL: https://n8n.wilkiedevs.com/webhook/descriptor
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAACsmy7e_yL9iyAXM
    container_name: lookitry-frontend
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vt-frontend.rule=Host(`lookitry.com`) || Host(`www.lookitry.com`)"
      - "traefik.http.routers.vt-frontend.entrypoints=websecure"
      - "traefik.http.routers.vt-frontend.tls.certresolver=mytlschallenge"
      - "traefik.http.services.vt-frontend.loadbalancer.server.port=3000"

  backend:
    build:
      context: /root/virtual-tryon/backend
      dockerfile: Dockerfile
    container_name: lookitry-backend
    restart: unless-stopped
    env_file:
      - /root/virtual-tryon/backend/.env.production
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vt-backend.rule=Host(`api.lookitry.com`)"
      - "traefik.http.routers.vt-backend.entrypoints=websecure"
      - "traefik.http.routers.vt-backend.tls.certresolver=mytlschallenge"
      - "traefik.http.services.vt-backend.loadbalancer.server.port=3001"

networks:
  proxy:
    external: true
