services:
  error-pages:
    build:
      context: /root/virtual-tryon/error-pages
      dockerfile: Dockerfile
    container_name: lookitry-error-pages
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vt-fallback.rule=Host(`lookitry.com`) || Host(`www.lookitry.com`) || Host(`api.lookitry.com`)"
      - "traefik.http.routers.vt-fallback.entrypoints=websecure"
      - "traefik.http.routers.vt-fallback.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.vt-fallback.priority=1"
      - "traefik.http.services.vt-fallback.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
