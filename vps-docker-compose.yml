version: "3.8"

services:
  # ============================================================================
  # N8N - Orquestador de automatizaciones
  # ============================================================================
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: root-n8n-1
    cpus: 2
    mem_limit: 2g
    environment:
      # Task Runner (DESHABILITADO para evitar CPU 600-800%)
      - N8N_RUNNERS_ENABLED=false
      - N8N_NATIVE_PYTHON_RUNNER=false
      # Configuración básica
      - GENERIC_TIMEZONE=America/Bogota
      - SSL_EMAIL=samwilkiedevs@gmail.com
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      # Dominio
      - DOMAIN_NAME=wilkiedevs.com
      - SUBDOMAIN=n8n
      # MinIO Storage
      - MINIO_SUBDOMAIN=minio
      - MINIO_ENDPOINT=https://minio.wilkiedevs.com
      - MINIO_BUCKET=images
      - MINIO_ACCESS_KEY=Wilkiedevs
      - MINIO_SECRET_KEY=Travis2305*
      - MINIO_PUBLIC_URL=https://minio.wilkiedevs.com
      # Gemini — para generar embeddings del Knowledge Base de Rebecca
      - GEMINI_API_KEY=***REMOVED-SECRET***
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - proxy
    ports:
      - "5678:5678"
    restart: unless-stopped

  # ============================================================================
  # BACKEND - API de Lookitry
  # ============================================================================
  backend:
    image: virtual-tryon-backend
    container_name: lookitry-backend
    environment:
      # === SERVIDOR ===
      - NODE_ENV=production
      - PORT=3001

      # === N8N ===
      - N8N_WEBHOOK_URL=https://n8n.wilkiedevs.com/webhook/wPLypk7KhBcFLicX
      - N8N_API_KEY=***REMOVED-SECRET***
      - N8N_BEARER_TOKEN=Travis2305**
      - N8N_TIMEOUT=90000
      - N8N_HEADER_NAME=Authorization

      # === SUPABASE ===
      - SUPABASE_URL=https://vkdooutklowctuudjnkl.supabase.co
      - SUPABASE_ANON_KEY=***REMOVED-SECRET***
      - SUPABASE_DB_PASSWORD=***REMOVED-SECRET***
      - SUPABASE_SERVICE_KEY=***REMOVED-SECRET***
      - SUPABASE_ACCESS_TOKEN=***REMOVED-SECRET***

      # === JWT ===
      - JWT_SECRET=***REMOVED-SECRET***
      - JWT_EXPIRES_IN=30d

      # === MINIO (S3 Storage) ===
      - MINIO_ENDPOINT=https://minio.wilkiedevs.com
      - MINIO_BUCKET=images
      - MINIO_ACCESS_KEY=Wilkiedevs
      - MINIO_SECRET_KEY=Travis2305*
      - MINIO_PUBLIC_URL=https://minio.wilkiedevs.com

      # === REDIS ===
      - REDIS_URL=redis://root-redis-1:6379

      # === EMAIL (SMTP) ===
      - SMTP_HOST=smtp.hostinger.com
      - SMTP_PORT=465
      - SMTP_SECURE=true
      - SMTP_USER=info@lookitry.com
      - SMTP_PASS=Travis2305*
      - SMTP_FROM=LOOKITRY <info@lookitry.com>

      # === FRONTEND / CORS ===
      - FRONTEND_URL=https://lookitry.com
      - CORS_ORIGIN=https://lookitry.com,https://www.lookitry.com,https://api.lookitry.com
      - COOKIE_DOMAIN=lookitry.com

      # === WOMPI (Pagos Colombia) ===
      - WOMPI_ENABLED=true
      - WOMPI_PUBLIC_KEY=pub_prod_CLbKyBa9DyeBWCI1hSzyoG85J76VbY8e
      - WOMPI_PRIVATE_KEY=***REMOVED-SECRET***
      - WOMPI_EVENTS_SECRET=prod_events_uXgDjJGTmg5qrWkDKll2dwtjkDO6OKd2
      - ***REMOVED-SECRET******REMOVED-SECRET***

      # === CLOUDFLARE TURNSTILE (Anti-spam) ===
      - TURNSTILE_ENABLED=true
      - TURNSTILE_SECRET_KEY=0x4AAAAAACsmy2ZsVW10HlNhDRP-ihDmo3o

      # === UPLOAD / ARCHIVOS ===
      - MAX_FILE_SIZE=5242880
      - ALLOWED_FILE_TYPES=image/jpeg,image/png,image/webp

      # === ENTERPRISE SYNC ===
      - ENTERPRISE_SYNC_TOKEN=lookitry_enterprise_sync_2026_03_27_WilkieSecure

      # === GOOGLE GEMINI (AI) ===
      - GEMINI_API_KEY=***REMOVED-SECRET***

      # === MEMORIA ===
      - NODE_OPTIONS=--max-old-space-size=512
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ============================================================================
  # FRONTEND - Next.js App
  # ============================================================================
  frontend:
    image: virtual-tryon-frontend
    container_name: lookitry-frontend
    environment:
      # === SERVIDOR ===
      - NODE_ENV=production
      # === API ===
      - NEXT_PUBLIC_API_URL=https://api.lookitry.com
      - NEXT_PUBLIC_APP_URL=https://lookitry.com
      # === SUPABASE ===
      - NEXT_PUBLIC_SUPABASE_URL=https://vkdooutklowctuudjnkl.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=***REMOVED-SECRET***
    networks:
      - proxy
    restart: unless-stopped

  # ============================================================================
  # REDIS - Cache y Queue
  # ============================================================================
  redis:
    image: redis:7
    container_name: root-redis-1
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - proxy
    restart: unless-stopped

  # ============================================================================
  # MINIO - Almacenamiento S3 (imágenes, etc)
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      - MINIO_ROOT_USER=Wilkiedevs
      - MINIO_ROOT_PASSWORD=Travis2305*
    volumes:
      - /var/lib/docker/volumes/minio_data/_data:/data
    networks:
      - proxy
    command: server /data --console-address ":9001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`minio.wilkiedevs.com`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.minio.service=minio"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(`minio.wilkiedevs.com`) && PathPrefix(`/ui`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    restart: unless-stopped

# ============================================================================
# REDES
# ============================================================================
networks:
  proxy:
    external: true

# ============================================================================
# VOLÚMENES
# ============================================================================
volumes:
  n8n_data:
  minio_data:
    name: minio_data
    external: true
